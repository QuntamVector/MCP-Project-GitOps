apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-platform

resources:
  - ../../base/mcp-api-gateway
  - ../../base/auth-service
  - ../../base/mcp-control-plane
  - ../../base/model-service
  - ../../base/ai-assistant
  - ../../base/recommendation-engine
  - ../../base/product-service
  - ../../base/user-service
  - ../../base/payment-service
  - ../../base/frontend
  - ../../base/redis
  # postgresql removed — using AWS RDS instead
  - hpa.yaml
  - ingress.yaml
  - cluster-issuer.yaml

# Point all images to ECR
images:
  - name: mcp-api-gateway
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/mcp-api-gateway
    newTag: latest
  - name: auth-service
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/auth-service
    newTag: latest
  - name: mcp-control-plane
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/mcp-control-plane
    newTag: latest
  - name: model-service
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/model-service
    newTag: latest
  - name: ai-assistant
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/ai-assistant
    newTag: latest
  - name: recommendation-engine
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/recommendation-engine
    newTag: latest
  - name: product-service
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/product-service
    newTag: latest
  - name: user-service
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/user-service
    newTag: latest
  - name: payment-service
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/payment-service
    newTag: latest
  - name: frontend
    newName: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/frontend
    newTag: latest

commonLabels:
  environment: production

patches:
  # Production replicas
  - path: patches/replicas.yaml
  # Production resource limits
  - path: patches/resources.yaml
  # model-service needs more CPU for AI inference
  - path: patches/model-service-resources.yaml
  # postgres-storage patch removed — using AWS RDS
