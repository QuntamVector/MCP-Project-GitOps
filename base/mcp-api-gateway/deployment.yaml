apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-api-gateway
  template:
    metadata:
      labels:
        app: mcp-api-gateway
    spec:
      containers:
        - name: mcp-api-gateway
          image: 508262720940.dkr.ecr.ap-northeast-1.amazonaws.com/mcp-platform/mcp-api-gateway:d76529fe15680794f623d8498ef411b6cd287adf
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mcp-config
            - secretRef:
                name: mcp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
