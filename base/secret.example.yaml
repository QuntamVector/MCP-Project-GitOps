# ─────────────────────────────────────────────────────────────
# DO NOT COMMIT REAL VALUES TO GIT
# Apply this manually on the server with real values:
#
#   kubectl apply -f secret.yaml -n mcp-platform
#
# Or use the one-liner at the bottom of this file.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secrets
  namespace: mcp-platform
type: Opaque
stringData:
  POSTGRES_USER: "mcp_user"
  POSTGRES_PASSWORD: "changeme"        # <-- replace with real password
  JWT_SECRET: "changeme-jwt-secret"    # <-- replace with real secret
  ANTHROPIC_API_KEY: "sk-ant-..."      # <-- replace with real Anthropic API key
  REDIS_PASSWORD: ""                   # leave empty if no Redis auth
