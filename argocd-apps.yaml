# ─────────────────────────────────────────────────────────────
# AppProject
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mcp-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: MCP Platform — AI + DevOps on AWS EKS
  sourceRepos:
    - https://github.com/QuntamVector/GitOps.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: mcp-platform
    - server: https://kubernetes.default.svc
      namespace: argocd
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: developer
      policies:
        - p, proj:mcp-platform:developer, applications, get,  mcp-platform/*, allow
        - p, proj:mcp-platform:developer, applications, sync, mcp-platform/*, allow
    - name: admin
      policies:
        - p, proj:mcp-platform:admin, applications, *, mcp-platform/*, allow
---
# ─────────────────────────────────────────────────────────────
# Wave 1 — Infrastructure
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp-platform
  source:
    repoURL: https://github.com/QuntamVector/GitOps.git
    targetRevision: HEAD
    path: overlays/eks
    kustomize:
      images:
        - redis:7-alpine
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp-platform
  source:
    repoURL: https://github.com/QuntamVector/GitOps.git
    targetRevision: HEAD
    path: base/postgresql
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
---
